version: '3.8'

services:
  detonate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: detonate-api
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - isolated
    tmpfs:
      - /tmp:noexec,nosuid,size=512m
      - /dev/shm:noexec,nosuid,size=256m
    volumes:
      # Web UI (read-only)
      - ./web:/app/web:ro
      # Windows DLLs (user-provided)
      - ./dlls/x86:/opt/rootfs/x86_windows/dlls:ro
      - ./dlls/x86_64:/opt/rootfs/x8664_windows/dlls:ro
      # Sample input
      - ./samples:/samples:ro
      # Output directory
      - ./output:/output:rw
      # Database persistence
      - ./data/db:/var/lib/detonate:rw
      # Rootfs tmp for emulation (writable for sample execution)
      - ./data/rootfs/x86_linux/tmp:/app/data/rootfs/x86_linux/tmp:rw
      - ./data/rootfs/x8664_linux/tmp:/app/data/rootfs/x8664_linux/tmp:rw
    ports:
      - "8000:8000"
    environment:
      - DETONATE_DATABASE=/var/lib/detonate/detonate.db
      - DETONATE_ROOTFS=/app/data/rootfs
      - DETONATE_DLLS_X86=/opt/rootfs/x86_windows/dlls
      - DETONATE_DLLS_X64=/opt/rootfs/x8664_windows/dlls
      - DETONATE_OUTPUT_DIR=/output
      - DETONATE_WEB_DIR=/app/web
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
          pids: 100
        reservations:
          cpus: '1'
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  isolated:
    driver: bridge
